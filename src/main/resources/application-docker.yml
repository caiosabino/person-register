spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:person_register}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

rabbitmq:
  listener:
    person-register:
      enabled: ${RABBITMQ_LISTENER_PERSON_REGISTER_ENABLED:false}
